<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sealed Scroll</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: radial-gradient(circle at top, #2b1a0d 0%, #120904 60%, #090402 100%);
      color: #f6e7c7;
      font-family: Georgia, serif;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 460px;
      min-height: 100vh;
      padding: 40px 20px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 20px;
      line-height: 1.25;
    }

    .sub {
      margin: 0 auto 24px;
      font-size: 13px;
      line-height: 1.5;
      opacity: 0.8;
      max-width: 360px;
    }

    .phrase-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .slot,
    .letter {
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(236, 199, 118, 0.35);
      background: rgba(255, 220, 150, 0.08);
      color: #f6e7c7;
      border-radius: 14px;
      cursor: pointer;
      transition: 0.18s ease;
      -webkit-touch-callout: none;
      touch-action: manipulation;
    }

    .slot {
      width: 50px;
      height: 60px;
      font-size: 24px;
    }

    .space {
      width: 16px;
      height: 60px;
    }

    .slot:hover,
    .letter:hover,
    button:hover {
      transform: scale(1.03);
    }

    .selected {
      box-shadow: 0 0 14px rgba(255, 215, 140, 0.42);
      border-color: rgba(255, 222, 148, 0.95);
      background: rgba(255, 220, 150, 0.16);
    }

    .solved {
      opacity: 0.72;
    }

    .decoded {
      min-height: 34px;
      margin: 10px 0;
      font-size: 20px;
      letter-spacing: 2px;
      line-height: 1.5;
      word-break: break-word;
    }

    #hint {
      min-height: 20px;
      margin-bottom: 16px;
      font-size: 13px;
      opacity: 0.8;
    }

    .letters {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .letter {
      height: 52px;
      font-size: 20px;
    }

    button {
      margin-top: 8px;
      padding: 14px 24px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #d9b14a, #f7e6b2);
      color: #3d2a12;
      font-family: Georgia, serif;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0
